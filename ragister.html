<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="apple-touch-icon" href="/img/logo.png">
    <title>RMC | EVENT REGISTRATION</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

<div class="video-bg">
    <video autoplay muted loop>
        <source src="/img/maths.mov" type="video/mp4">
    </video>
</div>

<section class="register-section">


    <form class="register-form">

        <input type="text" placeholder="FULL NAME" required>

        <input type="tel" placeholder="MOBILE NUMBER" required>

        <input type="text" placeholder="RBT NUMBER" required>

        <input type="number" placeholder="NUMBER OF GROUP MEMBERS" min="1" max="4" required>

        <select required>
            <option value="">SELECT EVENT</option>
            <option>x</option>
            <option>y</option>
            <option>z</option>
        
        </select>

        <div class="btn-group">
            <button type="submit" class="btn register-btn">REGISTER NOW</button>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn back-btn">BACK</a>
        </div>

    </form>

</section>

</body>
</html>
