<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMC | CLUB MEMBERS</title>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="apple-touch-icon" href="/img/logo.png">
    <link rel="stylesheet" href="css/members.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="img/rmc.mov" type="video/mp4">
        </video>
    </div>

    <header class="top-header">
        <h1>CLUB MEMBERS</h1>
        <p class="header-subtitle">Meet the talented people behind RMC</p>
    </header>

    <!-- ===== SEARCH AND FILTER ===== -->
    <div class="search-filter-section">
        <div class="search-container">
            <i class='bx bx-search'></i>
            <input type="text" id="memberSearch" class="member-search" placeholder="Search members by name or role...">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Faculty Advisor">Faculty</button>
            <button class="filter-btn" data-filter="Core Committee">Core</button>
            <button class="filter-btn" data-filter="General Member">Members</button>
        </div>
    </div>

    <!-- ===== DYNAMIC MEMBERS CONTAINER ===== -->
    <div id="dynamicMembersContainer" class="dynamic-members-container" style="display:none;"></div>

    <!-- STATIC FALLBACK (EMPTY - will be populated from admin.html) -->
    <section class="members" id="staticMembers" style="display:none;">
        <div class="members-placeholder">
            <i class='bx bx-user-circle'></i>
            <p>No members have been added yet. Add members from the admin panel!</p>
        </div>
    </section>
    <!-- END STATIC FALLBACK -->

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC5JKcHWc9N7OcH57vFVxF5gBHxKfsgjSw",
        authDomain: "rmcwebsite10.firebaseapp.com",
        databaseURL: "https://rmcwebsite10-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "rmcwebsite10",
        storageBucket: "rmcwebsite10.firebasestorage.app",
        messagingSenderId: "731012572422",
        appId: "1:731012572422:web:f1cc2692e7236f600daa87"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window._firebaseDB = db;
    window._firebaseRef = ref;
    window._firebaseSet = set;
    window._firebaseGet = get;
    window._firebaseRemove = remove;
    window._firebaseOnValue = onValue;
    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
</script>
<script src="js/firebase-db.js"></script>
<script src="js/members.js"></script>

<footer>
    <a href="index.html" class="back-btn">← Back to Home</a>
</footer>

</body>
</html>
